<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matt Hermano</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <a href="/home" aria-label="Go to Matt Hermano home page">Matt Hermano /home</a>

    <main class="container">
      <section class="hero">
        <h1>Matt Hermano</h1>
        <p class="quote">“Where I create, there I am true.” — Rainer Maria Rilke</p>

      <section aria-labelledby="music-heading" class="panel">
        <h2 id="music-heading">Music</h2>
        <div id="tracks" class="tracks"></div>

      <section aria-labelledby="video-heading" class="panel">

      <section aria-labelledby="booking-heading" class="panel">
        <h2 id="booking-heading">Booking inquiries</h2>
      </section>

        <h2 id="about-heading">About</h2>
        <p>
          “I am a Vancouver based singer-songwriter. You can find me playing at cafes and open mic nights all around
          Vancouver.”
        </p>

    <script type="module" src="./dist/main.js"></script>
