<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book — Matt Hermano</title>
    <meta name="description" content="Booking form for Matt Hermano." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="top-nav">
        <a class="brand" href="/">Matt Hermano</a>
        <nav aria-label="Main navigation">
          <ul class="nav-links">
            <li><a href="/">Music</a></li>
            <li><a href="/video/">Video</a></li>
            <li><a href="/gallery/">Gallery</a></li>
            <li><a href="/about/">About</a></li>
            <li><a href="/book/">Book</a></li>
          </ul>
        </nav>
      </header>

      <main class="page">
        <h1 class="section-title">Booking</h1>
        <form class="booking-form" action="https://formspree.io/f/xeepnjjr" method="POST">
          <label>
            Name
            <input type="text" name="name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Event type
            <select name="eventType" required>
              <option value="">Select one</option>
              <option value="house-concert">House concert</option>
              <option value="venue">Venue set</option>
              <option value="private">Private event</option>
            </select>
          </label>
          <label>
            Date
            <input type="date" name="eventDate" />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit">Send inquiry</button>
        </form>
      </main>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
