<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Matt Hermano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="top-nav" data-nav>
        <a class="brand" href="/">Matt Hermano</a>
        <div class="nav-group"><button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Toggle menu">☰</button><nav aria-label="Main navigation"><ul class="nav-links"><li><a href="/">Music</a></li><li><a href="/about/">About</a></li><li><a href="/gallery/">Gallery</a></li><li><a href="/video/">Video</a></li><li><a class="book-link" href="/book/">Book</a></li><li><a href="https://www.instagram.com/matthermanomusic" aria-label="Instagram">◎</a></li></ul></nav></div>
      </header>
      <main class="page">
        <h1 class="track-page-title">Gallery</h1>
        <section class="gallery" data-gallery tabindex="0" aria-label="Gallery carousel">
          <div class="gallery-viewport" data-gallery-viewport></div>
          <div class="gallery-controls">
            <button class="gallery-arrow" type="button" data-gallery-prev aria-label="Previous photo">←</button>
            <button class="gallery-arrow" type="button" data-gallery-next aria-label="Next photo">→</button>
          </div>
          <div class="gallery-thumbs" data-gallery-thumbs></div>
        </section>
      </main>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
