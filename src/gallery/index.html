<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Matt Hermano</title>
    <meta name="description" content="Live show gallery for Matt Hermano." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="top-nav">
        <a class="brand" href="/">Matt Hermano</a>
        <nav aria-label="Main navigation">
          <ul class="nav-links">
            <li><a href="/">Music</a></li>
            <li><a href="/video/">Video</a></li>
            <li><a href="/gallery/">Gallery</a></li>
            <li><a href="/about/">About</a></li>
            <li><a href="/book/">Book</a></li>
          </ul>
        </nav>
      </header>

      <main class="page">
        <section class="hero gallery-hero">
          <div>
            <h1>Gallery</h1>
          </div>
          <p class="hero-meta gallery-subheading">Live shows</p>
        </section>

        <section class="gallery" data-gallery tabindex="0" aria-label="Gallery carousel">
          <div class="gallery-viewport" data-gallery-viewport></div>
          <div class="gallery-controls">
            <button class="gallery-arrow" type="button" data-gallery-prev aria-label="Previous photo">←</button>
            <p class="gallery-counter" data-gallery-counter>1 / 1</p>
            <button class="gallery-arrow" type="button" data-gallery-next aria-label="Next photo">→</button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
