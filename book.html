<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book — Matt Hermano</title>
    <meta name="description" content="Book Matt Hermano for cafes, private events, and open mics." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="top-nav">
        <a class="brand" href="/">Matt Hermano</a>
        <nav aria-label="Primary navigation">
          <button class="menu-toggle" aria-expanded="false" aria-controls="site-nav">Menu</button>
          <ul id="site-nav" class="nav-links">
            <li><a href="/">Music</a></li>
            <li><a href="/gallery.html">Gallery</a></li>
            <li><a href="/about.html">About</a></li>
            <li><a class="active" href="/book.html">Book</a></li>
          </ul>
        </nav>
      </header>

      <main class="section">
        <header class="section-header"><span>Booking Inquiry</span><div aria-hidden="true"></div></header>
        <p>Available for cafes, open mics, and private events across Vancouver.</p>

        <form class="booking-form" action="mailto:bookings@heymhmusic.com" method="post" enctype="text/plain">
          <label>Name <input name="name" type="text" required /></label>
          <label>Email <input name="email" type="email" required /></label>
          <label>
            Event type
            <select name="event_type" required>
              <option value="">Select one</option>
              <option>Cafe</option>
              <option>Open mic</option>
              <option>Private event</option>
              <option>Other</option>
            </select>
          </label>
          <label>Date / time (optional) <input name="date_time" type="text" /></label>
          <label>Message <textarea name="message" required></textarea></label>
          <button type="submit">Send inquiry</button>
        </form>
      </main>
    </div>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
